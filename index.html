<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestión de Productos</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="mb-4 text-center">📦 Gestión de Productos</h1>

    <!-- Formulario para agregar productos -->
    <div class="card mb-4 shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Agregar Producto</h5>
        <form id="formProducto">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Nombre</label>
              <input type="text" id="nombre" class="form-control"
                placeholder="Ej: Laptop HP"/>
            </div>
            <div class="col-md-6">
              <label class="form-label">Categoría</label>
              <input type="text" id="categoria" class="form-control"
                placeholder="Ej: Electrónica"/>
            </div>
            <div class="col-md-6">
              <label class="form-label">Precio ($)</label>
              <input type="number" id="precio" class="form-control"
                placeholder="Ej: 299.99"/>
            </div>
            <div class="col-md-6">
              <label class="form-label">Stock</label>
              <input type="number" id="stock" class="form-control"
                placeholder="Ej: 10"/>
            </div>
          </div>
          <div id="mensajeError" class="text-danger mt-2 d-none"></div>
          <button type="submit" class="btn btn-primary mt-3">
            Agregar Producto
          </button>
        </form>
      </div>
    </div>

    <!-- Tabla dinámica de productos -->
    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Listado de Productos</h5>
        <table class="table table-striped table-hover">
          <thead class="table-dark">
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Stock</th>
            </tr>
          </thead>
          <tbody id="tablaProductos"></tbody>
        </table>
        <p id="sinProductos" class="text-muted text-center d-none">
          No hay productos registrados.
        </p>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
