<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestión de Productos</title>
 
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
 
  <!-- Font Awesome para iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
 
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
 
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="style.css">
 
  <style>
    .seccion {
      display: none;
    }
   
    .seccion.activa {
      display: block;
    }
   
    .nav-link {
      cursor: pointer;
    }
   
    .table-responsive {
      max-height: 600px;
      overflow-y: auto;
    }
  </style>
</head>


<body class="bg-light">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
      <a class="navbar-brand" href="#">
        <i class="fas fa-box"></i> Gestión de Productos
      </a>
      <div class="navbar-nav">
        <a class="nav-link active" href="#" onclick="mostrarSeccion('crear', this)">
          <i class="fas fa-plus"></i> Crear Producto
        </a>
        <a class="nav-link" href="#" onclick="mostrarSeccion('listado', this)">
          <i class="fas fa-list"></i> Listado
        </a>
      </div>
    </div>
  </nav>


  <!-- SECCIÓN CREAR PRODUCTO -->
  <div id="seccionCrear" class="seccion activa">
    <div class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow">
            <div class="card-header bg-success text-white text-center">
              <h3><i class="fas fa-plus-circle"></i> Crear Producto</h3>
            </div>
            <div class="card-body">
              <form id="formCrear">
                <div class="mb-3">
                  <label for="nombreCrear" class="form-label">Nombre del Producto</label>
                  <input type="text" class="form-control" id="nombreCrear" placeholder="Ej: Laptop Gaming" required>
                </div>
               
                <div class="mb-3">
                  <label for="precioCrear" class="form-label">Precio ($)</label>
                  <input type="number" class="form-control" id="precioCrear" step="0.01" placeholder="0.00" required>
                </div>
               
                <div class="mb-3">
                  <label for="categoriaCrear" class="form-label">Categoría</label>
                  <select class="form-select" id="categoriaCrear" required>
                    <option value="">Selecciona una categoría</option>
                  </select>
                </div>


                <div class="mb-3">
                  <label for="cantidadCrear" class="form-label">Cantidad Disponible</label>
                  <input type="number" class="form-control" id="cantidadCrear" min="0" placeholder="0" required>
                </div>
               
                <div class="mb-3">
                  <label for="descripcionCrear" class="form-label">Descripción</label>
                  <textarea class="form-control" id="descripcionCrear" rows="3" placeholder="Describe el producto..." required></textarea>
                </div>
               
                <div class="mb-3">
                  <label for="estadoCrear" class="form-label">Estado</label>
                  <select class="form-select" id="estadoCrear" required>
                    <option value="Activo">Activo</option>
                    <option value="Inactivo">Inactivo</option>
                  </select>
                </div>
               
                <button type="submit" class="btn btn-success w-100">
                  <i class="fas fa-plus"></i> Agregar Producto
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- SECCIÓN EDITAR PRODUCTO -->
  <div id="seccionEditar" class="seccion">
    <div class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow">
            <div class="card-header bg-warning text-white text-center">
              <h3><i class="fas fa-edit"></i> Editar Producto</h3>
            </div>
            <div class="card-body">
              <form id="formEditar">
                <div class="mb-3">
                  <label for="nombreEditar" class="form-label">Nombre del Producto</label>
                  <input type="text" class="form-control" id="nombreEditar" required>
                </div>
               
                <div class="mb-3">
                  <label for="precioEditar" class="form-label">Precio ($)</label>
                  <input type="number" class="form-control" id="precioEditar" step="0.01" required>
                </div>
               
                <div class="mb-3">
                  <label for="categoriaEditar" class="form-label">Categoría</label>
                  <select class="form-select" id="categoriaEditar" required>
                    <option value="">Selecciona una categoría</option>
                  </select>
                </div>


                <div class="mb-3">
                  <label for="cantidadEditar" class="form-label">Cantidad Disponible</label>
                  <input type="number" class="form-control" id="cantidadEditar" min="0" required>
                </div>
               
                <div class="mb-3">
                  <label for="descripcionEditar" class="form-label">Descripción</label>
                  <textarea class="form-control" id="descripcionEditar" rows="3" required></textarea>
                </div>
               
                <div class="mb-3">
                  <label for="estadoEditar" class="form-label">Estado</label>
                  <select class="form-select" id="estadoEditar" required>
                    <option value="Activo">Activo</option>
                    <option value="Inactivo">Inactivo</option>
                  </select>
                </div>
               
                <div class="d-flex gap-2">
                  <button type="submit" class="btn btn-warning flex-fill">
                    <i class="fas fa-save"></i> Actualizar Producto
                  </button>
                  <button type="button" class="btn btn-secondary" onclick="cancelarEdicion()">
                    <i class="fas fa-times"></i> Cancelar
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>


  <!-- SECCIÓN LISTADO DE PRODUCTOS -->
  <div id="seccionListado" class="seccion">
    <div class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-md-12">
          <div class="card shadow">
            <div class="card-header bg-info text-white text-center">
              <h3><i class="fas fa-list-ul"></i> Listado de Productos</h3>
            </div>
            <div class="card-body p-3">
              <!-- CAMPO DE BÚSQUEDA-->
              <div class="mb-3">
                <div class="input-group">
                  <span class="input-group-text bg-light">
                    <i class="fas fa-search"></i>
                  </span>
                  <input 
                    type="text" 
                    class="form-control" 
                    id="busquedaProducto" 
                    placeholder="Buscar producto por nombre..." 
                    autocomplete="off">
                  <button class="btn btn-outline-secondary" type="button" onclick="document.getElementById('busquedaProducto').value = ''; filtrarProductos('');">
                    <i class="fas fa-times"></i> Limpiar
                  </button>
                </div>
              </div>
              <div class="table-responsive">
              <div class="table-responsive">
                <table class="table table-hover table-striped mb-0">
                  <thead class="table-dark">
                    <tr>
                      <th>ID</th>
                      <th>Nombre</th>
                      <th>Precio</th>
                      <th>Categoría</th>
                      <th>Cantidad</th>
                      <th>Descripción</th>
                      <th>Estado</th>
                      <th>Acciones</th>
                    </tr>
                  </thead>
                  <tbody id="tablaProductos">
                    <!-- Las filas se cargan dinámicamente desde JavaScript -->
                  </tbody>
                </table>
              </div>
             
              <!-- Mensaje cuando no hay productos -->
              <div id="sinProductos" class="text-center p-5 d-none">
                <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                <p class="text-muted">No hay productos registrados</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>


  <!-- IMPORTANTE: Cargar el archivo JavaScript -->
  <script src="app.js"></script>
</body>
</html>
