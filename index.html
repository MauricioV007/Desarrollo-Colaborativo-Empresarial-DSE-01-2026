<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestión de Productos</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="style.css">  

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand" href="#">Gestión de Productos</a>
    <div class="navbar-nav">
      <a class="nav-link active" href="#" onclick="mostrarSeccion('crear')">Crear Producto</a>
      <a class="nav-link" href="#" onclick="mostrarSeccion('listado')">Listado</a>
    </div>
  </div>
</nav>

<!-- FORMULARIO ACTUAL pero MODIFICADO -->
   <div id="seccionCrear" class="seccion activa">
  <div class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card">
          <div class="card-header bg-success text-white text-center">
            <h3><i class="fas fa-plus"></i> Crear Producto</h3>
          </div>
          <div class="card-body">
            <form id="formProducto">
              <div class="mb-3">
                <label for="nombre" class="form-label">Nombre del Producto</label>
                <input type="text" class="form-control" id="nombre" required>
              </div>
              <div class="mb-3">
                <label for="precio" class="form-label">Precio ($)</label>
                <input type="number" class="form-control" id="precio" step="0.01" required>
              </div>
              <div class="mb-3">
                <label for="categoria" class="form-label">Categoría</label>
                <select class="form-select" id="categoria" required>
                  <option value="">Selecciona una categoría</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="descripcion" class="form-label">Descripción</label>
                <textarea class="form-control" id="descripcion" rows="3" required></textarea>
              </div>
              <div class="mb-3">
                <label for="estado" class="form-label">Estado</label>
                <select class="form-select" id="estado" required>
                  <option value="Activo">Activo</option>
                  <option value="Inactivo">Inactivo</option>
                </select>
              </div>
              <button type="submit" class="btn btn-success w-100" id="btnSubmit">
                <i class="fas fa-plus"></i> Agregar Producto
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="seccionListado" class="seccion">
  <!-- TABLA ACTUAL pero con columnas nuevas -->
  <div class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-md-10">
        <div class="card">
          <div class="card-header bg-info text-white text-center">
            <h3><i class="fas fa-list"></i> Listado de Productos</h3>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead class="table-dark">
                  <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Categoría</th>
                    <th>Descripción</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="tablaProductos">
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
